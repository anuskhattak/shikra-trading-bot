project:
  name: Shikra
  version: 0.1.0
  asset: XAUUSD
  magic_number: 202605

broker:
  timeframes:
    htf: D1        # Higher timeframe — major structure, BOS/CHoCH
    mtf: H4        # Medium timeframe — confirmation, order blocks
    ltf: H1        # Lower timeframe — entry precision
  max_spread_points: 30
  slippage_points: 5

risk:
  risk_per_trade_pct: 1.0
  max_daily_drawdown_pct: 5.0
  max_open_positions: 3
  min_risk_reward: 2.0
  decimal_precision: 5

smc:
  bos_lookback_bars: 20
  fvg_min_gap_points: 10
  ob_lookback_bars: 50
  liquidity_sweep_buffer: 5

sessions:
  asia:
    start: "00:00"
    end: "06:00"
    timezone: UTC
  london:
    start: "08:00"
    end: "12:00"
    timezone: UTC
  new_york:
    start: "13:00"
    end: "17:00"
    timezone: UTC

ml:
  confidence_threshold: 0.65
  model_path: backtest/models/

smc_engine:
  fractal_n: 2
  lookback_window: 20
  equal_level_tolerance_pips: 5
  confidence_threshold: 0.65
  weights:
    bos_or_choch: 0.40
    fvg: 0.30
    order_block: 0.20
    liquidity_sweep: 0.10
  min_candles: 50

logging:
  level: INFO
  trades_log: logs/trades.json
  signals_log: logs/false_signals.json
