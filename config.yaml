project:
  name: Shikra
  version: 0.1.0
  asset: XAUUSD
  magic_number: 202605

broker:
  timeframes:
    htf: D1        # Higher timeframe — major structure, BOS/CHoCH
    mtf: H4        # Medium timeframe — confirmation, order blocks
    ltf: H1        # Lower timeframe — entry precision
  max_spread_points: 30
  slippage_points: 5

risk:
  # Lot sizing
  risk_percent: 1.0            # % of balance risked per trade
  max_lot_size: 5.0            # Hard max lot cap
  min_lot_size: 0.01           # MT5 minimum (XAUUSD)
  pip_value_per_lot: 10.0      # XAUUSD: $10 per pip per standard lot (contract constant)

  # SL / TP (ATR-based)
  sl_atr_multiplier: 1.5       # SL = D1_ATR × this
  tp1_rr_ratio: 1.5            # TP1 = sl_distance × this
  tp2_rr_ratio: 3.0            # TP2 = sl_distance × this

  # Drawdown guard
  max_daily_drawdown: 5.0      # % drop from day_start_equity — blocks all trading when hit

  # Trade limits
  max_trades_per_day: 5
  max_trades_per_session: 2
  cooldown_after_sl_hours: 2.0

  # Recovery mode
  max_consecutive_losses: 3
  recovery_lot_multiplier: 0.5
  recovery_min_confidence: 0.80
  recovery_profit_target_pips: 50.0

smc:
  bos_lookback_bars: 20
  fvg_min_gap_points: 10
  ob_lookback_bars: 50
  liquidity_sweep_buffer: 5

sessions:
  london:
    local_open:  "08:00"
    local_close: "17:00"
    timezone:    "Europe/London"
    enabled:     true
  new_york:
    local_open:  "08:00"
    local_close: "17:00"
    timezone:    "America/New_York"
    enabled:     true

filters:
  spread:
    max_spread_usd: 0.50
  news:
    pre_event_minutes:  30
    post_event_minutes: 15
    calendar_path: "data/news_calendar.json"
    impact_levels: ["HIGH"]
  volatility:
    atr_lookback:      14
    low_atr_ratio:     0.50
    extreme_atr_ratio: 5.0

ml:
  confidence_threshold: 0.65
  model_path: backtest/models/

smc_engine:
  fractal_n: 2
  lookback_window: 20
  equal_level_tolerance_pips: 5
  confidence_threshold: 0.65
  weights:
    bos_or_choch: 0.40
    fvg: 0.30
    order_block: 0.20
    liquidity_sweep: 0.10
  min_candles: 50

logging:
  level: INFO
  trades_log: logs/trades.json
  signals_log: logs/false_signals.json
  filters_log: logs/filter_decisions.json
